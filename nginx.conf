proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=cdn_cache:10m max_size=1g inactive=24h;

server {
    listen 80;

    # HLS playlists (`master.m3u8`, per-tier `playlist.m3u8`) are
    # mutable — during a transcode they grow with new segments, and
    # the final drain rewrites them with `#EXT-X-ENDLIST`. Caching
    # them even briefly breaks progressive playback: the viewer's
    # player would poll the CDN and keep getting back the stale
    # initial version (with 1 segment and `#EXT-X-PLAYLIST-TYPE:
    # EVENT`) regardless of what MinIO actually has, so playback
    # stalls until the cache TTL expires. Bypass the cache entirely
    # for playlists and always fetch from the origin.
    location ~ \.m3u8$ {
        proxy_pass http://minio:9000/benri-stream$request_uri;
        proxy_cache off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Cache-Status "BYPASS" always;
    }

    # Segments (`.ts`) are immutable once written — the transcoder
    # never overwrites a numbered segment — so caching them for a
    # long time is both safe and desirable.
    location / {
        proxy_pass http://minio:9000/benri-stream/;
        proxy_cache cdn_cache;
        proxy_cache_valid 200 24h;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
    }
}
