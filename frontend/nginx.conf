server {
    listen 80;
    client_max_body_size 1100M;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the api service
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy HLS playlists and segments through the same origin as the
    # frontend. The viewer's browser only ever talks to the frontend
    # host, so share links work from any device / network / tunnel
    # without baking a hostname into the stream URL. The trailing slash
    # on `proxy_pass` strips the `/cdn/` prefix before forwarding.
    location /cdn/ {
        proxy_pass http://cdn/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — serve index.html for any unmatched route
    location / {
        try_files $uri $uri/ /index.html;
    }
}
