services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: benri_stream
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/benri-uploads;
      mc mb --ignore-existing local/benri-stream;
      mc anonymous set download local/benri-stream;
      "

  cdn:
    image: nginx:alpine
    depends_on:
      - minio
    ports:
      - "8888:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/benri_stream
      REDIS_URL: redis://redis:6379
      S3_UPLOAD_BUCKET: benri-uploads
      S3_OUTPUT_BUCKET: benri-stream
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      # Browser-facing endpoint for presigned upload URLs. Must be a
      # hostname the user's browser can actually reach — the internal
      # `minio` hostname above only resolves inside the docker network.
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      # Same-origin path: the frontend nginx proxies `/cdn/` to the
      # cdn container, so embedding `/cdn` in stream URLs lets viewers
      # reach HLS through whatever host they used to load the page —
      # localhost, LAN IP, or a tunnel — without baking a hostname in.
      CDN_BASE_URL: /cdn
      BASE_URL: http://localhost:18080
      LISTEN_ADDR: 0.0.0.0:8080
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "8080:8080"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/benri_stream
      REDIS_URL: redis://redis:6379
      S3_UPLOAD_BUCKET: benri-uploads
      S3_OUTPUT_BUCKET: benri-stream
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      # Worker doesn't render URLs to browsers, but keep this aligned
      # with the api so any future shared use of public_url is correct.
      CDN_BASE_URL: /cdn
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "18080:80"

volumes:
  pgdata:
  miniodata:
